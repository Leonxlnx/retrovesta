<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>200 AI Tells — The Complete Field Guide</title>
  <meta name="description" content="An interactive catalog of 200 telltale patterns that betray AI-generated websites, each with a visual preview.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=DM+Sans:ital,opsz,wght@0,9..40,300..700;1,9..40,300..700&family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500;600&family=Roboto:wght@400;500&family=Space+Grotesk:wght@400;500;600&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    :root{
      --bg:#faf9f7;--bg-card:#fff;--bg-code:#f3f2ef;--bg-hover:#f5f4f1;
      --border:#e8e6e1;--border-focus:#1a1a1a;
      --text:#1a1a1a;--text-2:#6b6560;--text-3:#9e9890;
      --red:#c0392b;--red-bg:#fdf2f0;--red-bdr:#f0cdc8;
      --yel:#b8860b;--yel-bg:#fdf8ee;--yel-bdr:#ecdcb0;
      --grn:#1e7a46;--grn-bg:#eef8f2;--grn-bdr:#bce0ca;
      --r:8px;--r-lg:12px;
      --f-d:'Instrument Serif',Georgia,serif;
      --f-b:'DM Sans',system-ui,sans-serif;
      --f-m:'JetBrains Mono','Fira Code',monospace;
      --sh:0 1px 2px rgba(0,0,0,.04);
    }
    html{font-family:var(--f-b);background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;scroll-behavior:smooth;font-size:16px}
    body{min-height:100dvh}
    ::selection{background:#1a1a1a;color:#fff}

    .hero{padding:64px 24px 32px;max-width:720px;margin:0 auto;text-align:center}
    .hero-label{display:inline-block;font-size:.7rem;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--text-3);margin-bottom:16px;padding:5px 12px;border:1px solid var(--border);border-radius:100px}
    .hero h1{font-family:var(--f-d);font-size:clamp(2.4rem,6vw,3.8rem);font-weight:400;letter-spacing:-.02em;line-height:1.05;margin-bottom:12px}
    .hero p{font-size:1rem;color:var(--text-2);line-height:1.6;max-width:480px;margin:0 auto;font-weight:300}

    .stats{display:flex;justify-content:center;gap:1px;margin:24px auto 0;max-width:420px;background:var(--border);border-radius:var(--r-lg);overflow:hidden;box-shadow:var(--sh)}
    .stat{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:14px 8px;background:var(--bg-card)}
    .stat-n{font-size:1.5rem;font-weight:600;font-variant-numeric:tabular-nums;letter-spacing:-.02em}
    .stat-l{font-size:.6rem;color:var(--text-3);text-transform:uppercase;letter-spacing:.08em;font-weight:500}
    .s-r{color:var(--red)}.s-y{color:var(--yel)}.s-g{color:var(--grn)}

    .controls{max-width:900px;margin:0 auto;padding:16px 24px 10px;position:sticky;top:0;z-index:100;background:var(--bg)}
    .controls::after{content:'';position:absolute;bottom:-16px;left:0;right:0;height:16px;background:linear-gradient(var(--bg),transparent);pointer-events:none}
    .search-w{position:relative;margin-bottom:8px}
    .search-w svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text-3);width:16px;height:16px;pointer-events:none}
    .si{width:100%;padding:11px 14px 11px 40px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-family:var(--f-b);font-size:.88rem;outline:none;transition:border-color .15s,box-shadow .15s;box-shadow:var(--sh)}
    .si::placeholder{color:var(--text-3)}
    .si:focus{border-color:var(--border-focus);box-shadow:0 0 0 3px rgba(26,26,26,.06)}
    .fr{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-bottom:4px}
    .fb{padding:5px 13px;border-radius:100px;border:1px solid var(--border);background:var(--bg-card);color:var(--text-2);font-family:var(--f-b);font-size:.78rem;font-weight:500;cursor:pointer;transition:all .15s;white-space:nowrap}
    .fb:hover{border-color:var(--text-3);color:var(--text)}
    .fb.a{background:var(--text);border-color:var(--text);color:#fff}
    .fb.ar{background:var(--red-bg);border-color:var(--red-bdr);color:var(--red)}
    .fb.ay{background:var(--yel-bg);border-color:var(--yel-bdr);color:var(--yel)}
    .fb.ag{background:var(--grn-bg);border-color:var(--grn-bdr);color:var(--grn)}
    .fs{width:1px;height:16px;background:var(--border);margin:0 2px}
    .rc{font-size:.7rem;color:var(--text-3);margin-top:2px;font-variant-numeric:tabular-nums}

    .content{max-width:900px;margin:0 auto;padding:0 24px 80px}
    .cs{margin-bottom:36px}
    .ch{display:flex;align-items:baseline;gap:8px;padding:6px 0;margin-bottom:4px;border-bottom:2px solid var(--text);position:sticky;top:76px;background:var(--bg);z-index:50}
    .ct{font-family:var(--f-d);font-size:1.15rem;font-weight:400}
    .cc{font-size:.68rem;color:var(--text-3);font-variant-numeric:tabular-nums;font-weight:500}

    .tg{display:grid;grid-template-columns:1fr;gap:2px;margin-top:6px}

    .ti{display:flex;gap:12px;padding:9px 12px;border-radius:var(--r);transition:background .12s;cursor:default}
    .ti:hover{background:var(--bg-hover)}
    .sp{width:7px;height:7px;border-radius:50%;margin-top:7px;flex-shrink:0}
    .sp.i{background:var(--red)}.sp.c{background:var(--yel)}.sp.s{background:var(--grn)}
    .tb{flex:1;min-width:0}
    .tn{font-weight:500;font-size:.9rem;line-height:1.35}
    .td{font-size:.82rem;color:var(--text-3);line-height:1.4;margin-top:2px}
    .td code{font-family:var(--f-m);font-size:.7rem;background:var(--bg-code);padding:1px 4px;border-radius:3px;color:var(--text-2);border:1px solid var(--border)}
    mark{background:#fff3cd;color:var(--text);border-radius:2px;padding:0 2px}

    /* Preview box */
    .tp{width:172px;height:62px;flex-shrink:0;border-radius:6px;overflow:hidden;border:1px solid var(--border);background:var(--bg-code);display:flex;align-items:center;justify-content:center;position:relative}
    .tp *{pointer-events:none}

    .empty{text-align:center;padding:48px 24px;color:var(--text-3)}
    footer{text-align:center;padding:28px 24px;border-top:1px solid var(--border);max-width:900px;margin:0 auto}
    footer p{font-size:.75rem;color:var(--text-3)}
    footer a{color:var(--text);text-decoration:underline;text-underline-offset:2px}

    @media(max-width:640px){
      .hero{padding:40px 16px 20px}
      .controls{padding:12px 16px 8px}
      .content{padding:0 16px 48px}
      .ch{top:72px}
      .fb{padding:5px 8px;font-size:.7rem}
      .stats{max-width:100%;margin-left:16px;margin-right:16px}
      .fs{display:none}
      .tp{width:120px;height:46px}
      .ti{padding:8px 8px}
    }
    @media(max-width:380px){
      .hero h1{font-size:2rem}
      .stat-n{font-size:1.2rem}
      .tp{width:100px;height:40px}
    }
  </style>
</head>
<body>
  <header class="hero">
    <div class="hero-label">Taste Skill Research</div>
    <h1>200 AI Tells</h1>
    <p>Every pattern that betrays AI-generated frontend. Each one with a visual preview.</p>
    <div class="stats">
      <div class="stat"><span class="stat-n" id="sT">200</span><span class="stat-l">Total</span></div>
      <div class="stat"><span class="stat-n s-r" id="sI">0</span><span class="stat-l">Instant</span></div>
      <div class="stat"><span class="stat-n s-y" id="sC">0</span><span class="stat-l">Common</span></div>
      <div class="stat"><span class="stat-n s-g" id="sS">0</span><span class="stat-l">Subtle</span></div>
    </div>
  </header>

  <div class="controls">
    <div class="search-w">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.2-5.2m0 0A7.5 7.5 0 1 0 5.6 5.6a7.5 7.5 0 0 0 10.2 10.2Z"/></svg>
      <input type="text" class="si" id="q" placeholder='Search 200 tells...'>
    </div>
    <div class="fr" id="fR">
      <button class="fb a" data-f="all">All</button>
      <button class="fb" data-f="instant">Instant</button>
      <button class="fb" data-f="common">Common</button>
      <button class="fb" data-f="subtle">Subtle</button>
      <span class="fs"></span>
      <span id="cR"></span>
    </div>
    <div class="rc" id="rC"></div>
  </div>

  <main class="content" id="m"></main>
  <footer><p>Part of the <a href="https://github.com/Leonxlnx/taste-skill">Taste Skill</a> research corpus</p></footer>

  <script src="data.js"></script>
  <script src="previews.js"></script>
  <script src="app.js"></script>
</body>
</html>
